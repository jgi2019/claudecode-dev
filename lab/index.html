<!DOCTYPE html>
<html lang="ja">
<head>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f5f0;--fg:#0e0e0e;--muted:#999;--border:#e0dbd4;--card:#fff}
html,body{background:var(--bg);color:var(--fg);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
body{padding:48px}
nav{display:flex;align-items:center;gap:12px;margin-bottom:80px}
nav a{font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:.08em}
nav a:hover{color:var(--fg)}
nav span{font-size:12px;color:var(--muted)}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:64px;border-bottom:1px solid var(--border);padding-bottom:32px}
.section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(60px,10vw,120px);letter-spacing:-.03em;line-height:1}
.section-meta{text-align:right}
.section-meta p{font-size:12px;color:var(--muted);letter-spacing:.08em;line-height:1.8}
.articles{display:flex;flex-direction:column;gap:0}
.article{display:flex;align-items:flex-start;gap:48px;padding:36px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit}
.article:hover .article-title{text-decoration:underline;text-underline-offset:4px}
.article-num{font-family:'Syne',sans-serif;font-size:11px;color:var(--muted);width:32px;flex-shrink:0;padding-top:4px}
.article-body{flex:1}
.article-tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.article-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:10px;line-height:1.2}
.article-desc{font-size:13px;color:#666;line-height:1.8;font-weight:300;max-width:560px}
.article-date{font-size:11px;color:var(--muted);flex-shrink:0;padding-top:4px}
.article-arrow{font-size:18px;flex-shrink:0;padding-top:2px;opacity:0;transition:opacity .2s}
.article:hover .article-arrow{opacity:1}
footer{margin-top:64px;display:flex;justify-content:space-between}
footer a{font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.08em}
footer a:hover{color:var(--fg)}
</style>
</head>
<body>
<nav>
  <a href="/">UDLR</a>
  <span>/</span>
  <span style="color:var(--fg);font-weight:500">LAB</span>
</nav>

  </div>
</div>
<div class="articles">

    <div class="article-body">
      <div class="article-tag">Case Study</div>
      <div class="article-title">AIネイティブな組織に不可欠なインフラ設計</div>
      <div class="article-desc">レジリエンス・リカバリー・生産性向上。クラウドに正本を置き、誰が欠けても1日で復旧できる組織インフラを構築した記録。</div>
    </div>
    <div class="article-date">2026.04</div>
    <div class="article-arrow">→</div>
  </a>
</div>
